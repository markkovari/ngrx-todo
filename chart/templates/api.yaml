apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: {{ .Release.Name }}-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-api
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-api
    spec:
      containers:
      - name: api
        image: "{{ .Values.api.image }}:{{ .Values.api.tag }}"
        imagePullPolicy: Never
        ports:
        - containerPort: {{ .Values.api.port }}
        env:
        - name: PORT
          value: "{{ .Values.api.port }}"
        - name: FRONTEND_URL
          value: "http://{{ .Release.Name }}-app"
        readinessProbe:
          httpGet:
            path: /todos
            port: {{ .Values.api.port }}
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
spec:
  selector:
    app: {{ .Release.Name }}-api
  ports:
  - port: {{ .Values.api.port }}
    targetPort: {{ .Values.api.port }}
