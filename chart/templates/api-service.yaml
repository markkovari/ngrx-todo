apiVersion: v1
kind: Service
metadata:
  name: {{ include "todo-app.fullname" . }}-api
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: 3000
      protocol: TCP
  selector:
    app.kubernetes.io/component: api
