apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-test-frontend
  labels:
    app: {{ .Release.Name }}-test
    {{- include "todo-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-frontend
      image: curlimages/curl:latest
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "=== Helm Test: Frontend Verification ==="

          FRONTEND_URL="http://{{ .Release.Name }}-frontend:{{ .Values.frontend.service.port }}"

          echo "1. Testing GET / (frontend index)..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$FRONTEND_URL/")
          echo "   HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "   FAIL: Expected 200"
            exit 1
          fi
          echo "   PASS"

          echo "2. Checking HTML content..."
          BODY=$(curl -sf "$FRONTEND_URL/")
          echo "$BODY" | grep -qi "html" || { echo "   FAIL: No HTML content"; exit 1; }
          echo "   PASS"

          echo "=== All frontend tests passed ==="
